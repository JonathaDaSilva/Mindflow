version: '3.8'

services:
  # Banco de Dados 
  postgres:
    image: postgres:15-alpine
    container_name: mindflow_db
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password_secret
      POSTGRES_DB: mindflow_main
    ports:
      - "5432:5432"
    volumes:
      - ./init/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata:/var/lib/postgresql/data

  # Middleware de Mensageria (Sprint 2)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mindflow_mq
    ports:
      - "5672:5672"   # Porta do protocolo AMQP
      - "15672:15672" # Painel administrativo (login: guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  api:
    build: ./backend
    container_name: backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      DATABASE_URL: "postgresql://user_admin:password_secret@postgres:5432/mindflow_main?schema=public"
      JWT_SECRET: "7cd98969b923af15a751efc26222b15830682a750accfc81dca9e811d6fafc7e"
      RABBIT_URL: "amqp://guest:guest@rabbitmq:5672"
    depends_on:
      - postgres
      - rabbitmq

volumes:
  pgdata: