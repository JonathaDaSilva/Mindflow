spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mindflow
    username: ${DB_USER:admin}
    password: ${DB_PASS:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update        
    show-sql: true           
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: mindflow-secret-key-deve-ter-32-chars-minimo-2026
  expiration: 86400000        

server:
  port: 8080