version: '3.8'

services:
  # Banco de Dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: mindflow-db
    environment:
      POSTGRES_USER: mindflow_user
      POSTGRES_PASSWORD: mindflow_password
      POSTGRES_DB: mindflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Mensageria RabbitMQ (com plugin Management para UI)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: mindflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # Porta do protocolo AMQP (usada pelo Spring Boot)
      - "15672:15672" # Porta da interface web de gerenciamento
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data: