services:

  postgres:
    image: postgres:15-alpine
    container_name: mindflow-db
    environment:
      POSTGRES_USER: mindflow_user
      POSTGRES_PASSWORD: mindflow_password
      POSTGRES_DB: mindflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindflow_user -d mindflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: mindflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mindflow-api:
    build:
      context: ./mindflow-api
      dockerfile: Dockerfile
    container_name: mindflow-api
    ports:
      - "8080:8080"
    environment:
      DB_USER: mindflow_user
      DB_PASS: mindflow_password
      RABBIT_USER: guest
      RABBIT_PASS: guest
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mindflow_db
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data: