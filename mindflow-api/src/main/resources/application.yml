spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mindflow_db}
    username: ${DB_USER:mindflow_user}
    password: ${DB_PASS:mindflow_password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
  security:
    filter:
      dispatcher-types: request, async, error

jwt:
  secret: mindflow-secret-key-2026-deve-ter-32chars
  expiration: 86400000

server:
  port: 8080
  servlet:
    context-path: /api
    
logging:
  level:
    org.springframework.security: DEBUG